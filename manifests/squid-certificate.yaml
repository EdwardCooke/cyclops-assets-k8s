apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: squid
  namespace: cyclops-assets
spec:
  commonName: squid.cyclops-assets
  dnsNames:
  - squid.cyclops-assets
  - squid
  - localhost
  duration: 720h0m0s
  isCA: true
  issuerRef:
    group: cert-manager.io
    kind: Issuer
    name: certificate-authority
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    rotationPolicy: Always
    size: 2048
  renewBefore: 480h0m0s
  secretName: squid-tls
  subject:
    organizations:
    - Cyclops-k8s
  usages:
  - client auth
  - server auth
